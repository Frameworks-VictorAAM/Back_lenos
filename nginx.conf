events {
    worker_connections 1024;
}

http {
    # ¡Esta línea es la que arregla tu error!
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    # Redirección de HTTP a HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host:8443$request_uri;
    }

    # El Guardián de la API (HTTPS)
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            # Cabeceras CORS
            add_header 'Access-Control-Allow-Origin' 'https://front-lenos.vercel.app' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Accept,Content-Type,Origin,Authorization,x-auth-token' always;

            # Manejo de pre-flight (OPTIONS)
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'https://front-lenos.vercel.app' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Accept,Content-Type,Origin,Authorization,x-auth-token' always;
                return 204;
            } # <--- AQUÍ FALTABA ESTA LLAVE

            # Proxy hacia Node.js
            # Quitamos el /api/ del final para evitar el error "URI part"
            proxy_pass http://app-logic:5000; 
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Evitar el 502 del favicon
        location = /favicon.ico {
            log_not_found off;
            access_log off;
            return 204;
        }
    }
}